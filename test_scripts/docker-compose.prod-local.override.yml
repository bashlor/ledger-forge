services:
  migrate:
    environment:
      APP_URL: ${TEST_PROD_APP_URL}
      DEV_TOOLS_DESTRUCTIVE_OPERATIONS_ENABLED: 'false'
      DEV_TOOLS_ENABLED: 'false'
      DEMO_COMMANDS_ENABLED: 'false'
      DEMO_MODE_ENABLED: 'false'
      LIMITER_STORE: ${LIMITER_STORE:-redis}
      NODE_ENV: production
      SESSION_DRIVER: ${SESSION_DRIVER:-cookie}

  app:
    environment:
      APP_URL: ${TEST_PROD_APP_URL}
      DEV_TOOLS_DESTRUCTIVE_OPERATIONS_ENABLED: 'false'
      DEV_TOOLS_ENABLED: 'false'
      DEMO_COMMANDS_ENABLED: 'false'
      DEMO_MODE_ENABLED: 'false'
      LIMITER_STORE: ${LIMITER_STORE:-redis}
      NODE_ENV: production
      SESSION_DRIVER: ${SESSION_DRIVER:-cookie}

  maintenant:
    image: ghcr.io/kolapsis/maintenant:latest
    container_name: ${MAINTENANT_CONTAINER_NAME:-accounting-maintenant-test-prod}
    ports:
      - '127.0.0.1:${MAINTENANT_PORT:-8080}:8080'
    read_only: true
    security_opt:
      - no-new-privileges:true
    group_add:
      - '${DOCKER_GID:-983}'
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - maintenant_test_data:/data
    environment:
      MAINTENANT_ADDR: '0.0.0.0:8080'
      MAINTENANT_DB: '/data/maintenant.db'
    restart: unless-stopped
    networks:
      - accounting_test_internal

volumes:
  maintenant_test_data:
