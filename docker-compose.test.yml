#Test production image build and locally.
#!!! DO NOT USE IT IN PRODUCTION !!!
services:
  postgres:
    image: docker.io/postgres:17-alpine@sha256:979c4379dd698aba0b890599a6104e082035f98ef31d9b9291ec22f2b13059ca
    container_name: ${POSTGRES_CONTAINER_NAME:-accounting-pg-test}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - '127.0.0.1:${TEST_PROD_DB_PORT:-55432}:5432'
    environment:
      POSTGRES_USER: accounting
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: accounting-test
    volumes:
      - pg_test_data:/var/lib/postgresql/data
      - type: bind
        source: ${DOCKER_SECRETS_DIR:-./tmp/docker-secrets/test-prod}/db_password
        target: /run/secrets/db_password
        read_only: true
        bind:
          create_host_path: false
          selinux: z
    networks:
      - accounting_test_internal

  redis:
    image: docker.io/redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: ${REDIS_CONTAINER_NAME:-accounting-redis-test}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'redis-cli --no-auth-warning -a "$$(cat /run/secrets/redis_password)" ping | grep PONG',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - '127.0.0.1:${TEST_PROD_REDIS_PORT:-56379}:6379'
    command:
      [
        '/bin/sh',
        '-ec',
        'exec redis-server --appendonly yes --requirepass "$$(cat /run/secrets/redis_password)"',
      ]
    volumes:
      - redis_test_data:/data
      - type: bind
        source: ${DOCKER_SECRETS_DIR:-./tmp/docker-secrets/test-prod}/redis_password
        target: /run/secrets/redis_password
        read_only: true
        bind:
          create_host_path: false
          selinux: z
    networks:
      - accounting_test_internal

  migrate:
    # One-shot: must exit so `app` can start (`service_completed_successfully`).
    restart: 'no'
    build:
      context: .
      dockerfile: Dockerfile
      target: build
      args:
        BUILD_APP_URL: ${TEST_PROD_APP_URL}
        BUILD_DB_DATABASE: ${DB_DATABASE}
        BUILD_DB_HOST: ${DB_HOST}
        BUILD_DB_PORT: ${DB_PORT}
        BUILD_DB_USER: ${DB_USER}
        BUILD_HOST: ${HOST}
        BUILD_LOG_LEVEL: ${LOG_LEVEL}
        BUILD_PORT: ${PORT}
        BUILD_POSTGRES_TEST_IMAGE: ${POSTGRES_TEST_IMAGE:-postgres:17-alpine}
        BUILD_REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION}
        BUILD_SESSION_DRIVER: ${SESSION_DRIVER}
      secrets:
        - source: app_key
          target: app_key
        - source: better_auth_secret
          target: better_auth_secret
        - source: db_password
          target: db_password
    environment:
      ACCOUNTING_RUNTIME_DIR: /var/lib/accounting-secrets
      DB_DATABASE: accounting-test
      DB_PORT: 5432
      DB_USER: accounting
      LIMITER_STORE: memory
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: test
      POSTGRES_TEST_IMAGE: ${POSTGRES_TEST_IMAGE:-postgres:17-alpine}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-false}
      SESSION_DRIVER: memory
      TZ: UTC
      APP_URL: ${TEST_PROD_APP_URL}
      DB_HOST: postgres
      HOST: 0.0.0.0
      PORT: 3333
    entrypoint: ['/bin/sh', '/app/docker/with-docker-secrets.sh']
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ['ace', 'migration:run']
    volumes:
      - type: bind
        source: ${DOCKER_SECRETS_DIR:-./tmp/docker-secrets/test-prod}/app_key
        target: /run/secrets/app_key
        read_only: true
        bind:
          create_host_path: false
          selinux: z
      - type: bind
        source: ${DOCKER_SECRETS_DIR:-./tmp/docker-secrets/test-prod}/better_auth_secret
        target: /run/secrets/better_auth_secret
        read_only: true
        bind:
          create_host_path: false
          selinux: z
      - type: bind
        source: ${DOCKER_SECRETS_DIR:-./tmp/docker-secrets/test-prod}/db_password
        target: /run/secrets/db_password
        read_only: true
        bind:
          create_host_path: false
          selinux: z
      - type: bind
        source: ${DOCKER_SECRETS_DIR:-./tmp/docker-secrets/test-prod}/redis_password
        target: /run/secrets/redis_password
        read_only: true
        bind:
          create_host_path: false
          selinux: z
      - app_test_runtime_secrets:/var/lib/accounting-secrets
    networks:
      - accounting_test_internal

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        BUILD_APP_URL: ${TEST_PROD_APP_URL}
        BUILD_DB_DATABASE: ${DB_DATABASE}
        BUILD_DB_HOST: ${DB_HOST}
        BUILD_DB_PORT: ${DB_PORT}
        BUILD_DB_USER: ${DB_USER}
        BUILD_HOST: ${HOST}
        BUILD_LOG_LEVEL: ${LOG_LEVEL}
        BUILD_PORT: ${PORT}
        BUILD_POSTGRES_TEST_IMAGE: ${POSTGRES_TEST_IMAGE:-postgres:17-alpine}
        BUILD_REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION}
        BUILD_SESSION_DRIVER: ${SESSION_DRIVER}
      secrets:
        - source: app_key
          target: app_key
        - source: better_auth_secret
          target: better_auth_secret
        - source: db_password
          target: db_password
    environment:
      ACCOUNTING_RUNTIME_DIR: /var/lib/accounting-secrets
      DB_DATABASE: accounting-test
      DB_PORT: 5432
      DB_USER: accounting
      LIMITER_STORE: memory
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: test
      POSTGRES_TEST_IMAGE: ${POSTGRES_TEST_IMAGE:-postgres:17-alpine}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-false}
      SESSION_DRIVER: memory
      TZ: UTC
      APP_URL: ${TEST_PROD_APP_URL}
      DB_HOST: postgres
      HOST: 0.0.0.0
      PORT: 3333
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - '127.0.0.1:${TEST_PROD_APP_PORT:-3334}:3333'
    volumes:
      - type: bind
        source: ${DOCKER_SECRETS_DIR:-./tmp/docker-secrets/test-prod}/app_key
        target: /run/secrets/app_key
        read_only: true
        bind:
          create_host_path: false
          selinux: z
      - type: bind
        source: ${DOCKER_SECRETS_DIR:-./tmp/docker-secrets/test-prod}/better_auth_secret
        target: /run/secrets/better_auth_secret
        read_only: true
        bind:
          create_host_path: false
          selinux: z
      - type: bind
        source: ${DOCKER_SECRETS_DIR:-./tmp/docker-secrets/test-prod}/db_password
        target: /run/secrets/db_password
        read_only: true
        bind:
          create_host_path: false
          selinux: z
      - type: bind
        source: ${DOCKER_SECRETS_DIR:-./tmp/docker-secrets/test-prod}/redis_password
        target: /run/secrets/redis_password
        read_only: true
        bind:
          create_host_path: false
          selinux: z
      - app_test_runtime_secrets:/var/lib/accounting-secrets
    networks:
      - accounting_test_internal

volumes:
  app_test_runtime_secrets:
  pg_test_data:
  redis_test_data:

secrets:
  app_key:
    file: ${DOCKER_SECRETS_DIR:-./tmp/docker-secrets/test-prod}/app_key
  better_auth_secret:
    file: ${DOCKER_SECRETS_DIR:-./tmp/docker-secrets/test-prod}/better_auth_secret
  db_password:
    file: ${DOCKER_SECRETS_DIR:-./tmp/docker-secrets/test-prod}/db_password
  redis_password:
    file: ${DOCKER_SECRETS_DIR:-./tmp/docker-secrets/test-prod}/redis_password

networks:
  accounting_test_internal:
    driver: bridge
