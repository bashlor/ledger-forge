name: Tests

on:
  pull_request:

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.7.0
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          cache: pnpm
          node-version: 24

      - name: Prepare test environment
        run: cp .env.test.example .env.test

      - run: pnpm install --frozen-lockfile

      - name: Verify pinned Docker image refs
        run: ./scripts/sync-docker-images.sh verify

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  frontend-unit:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.7.0
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          cache: pnpm
          node-version: 24

      - name: Prepare test environment
        run: cp .env.test.example .env.test

      - run: pnpm install --frozen-lockfile

      - name: Frontend component tests
        run: pnpm test:unit:frontend

  backend-unit:
    name: Backend unit tests
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.7.0
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          cache: pnpm
          node-version: 24

      - name: Prepare test environment
        run: cp .env.test.example .env.test

      - run: pnpm install --frozen-lockfile

      - name: Backend unit tests
        run: pnpm test:unit:backend
