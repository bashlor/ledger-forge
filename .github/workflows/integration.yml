name: Integration

on:
  push:
    branches:
      - main

jobs:
  backend-integration:
    name: Backend ${{ matrix.suite }} tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - integration
          - routes
          - console
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with:
          version: 10.32.1
          run_install: false
      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: 24

      - name: Prepare test environment
        run: cp .env.test.example .env.test

      - run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.suite }} suite
        run: pnpm test:${{ matrix.suite }}
