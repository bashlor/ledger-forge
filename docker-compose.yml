services:
  postgres:
    image: docker.io/postgres:17-alpine@sha256:979c4379dd698aba0b890599a6104e082035f98ef31d9b9291ec22f2b13059ca
    container_name: ${POSTGRES_CONTAINER_NAME:-accounting-pg}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - '127.0.0.1:${DB_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - type: bind
        source: ${DOCKER_SECRETS_DIR:-./tmp/docker-secrets/dev}/db_password
        target: /run/secrets/db_password
        read_only: true
        bind:
          create_host_path: false
          selinux: z
    networks:
      - accounting_internal

  redis:
    image: docker.io/redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: ${REDIS_CONTAINER_NAME:-accounting-redis}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'redis-cli --no-auth-warning -a "$$(cat /run/secrets/redis_password)" ping | grep PONG',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - '127.0.0.1:${REDIS_PORT:-6379}:6379'
    command:
      [
        '/bin/sh',
        '-ec',
        'exec redis-server --appendonly yes --requirepass "$$(cat /run/secrets/redis_password)"',
      ]
    volumes:
      - redis_data:/data
      - type: bind
        source: ${DOCKER_SECRETS_DIR:-./tmp/docker-secrets/dev}/redis_password
        target: /run/secrets/redis_password
        read_only: true
        bind:
          create_host_path: false
          selinux: z
    networks:
      - accounting_internal
  maintenant:
    image: ghcr.io/kolapsis/maintenant:latest@sha256:2493b59e2993eb4e75ba82bf7c04931a4dd5f280d7bbe887d48fe2ebe7e38e48
    container_name: ${MAINTENANT_CONTAINER_NAME:-accounting-maintenant}
    ports:
      - '127.0.0.1:${MAINTENANT_PORT:-8080}:8080'
    read_only: true
    security_opt:
      - no-new-privileges:true
    group_add:
      - '${DOCKER_GID:-983}' # match host's docker group
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - maintenant-data:/data
    environment:
      MAINTENANT_ADDR: '0.0.0.0:8080'
      MAINTENANT_DB: '/data/maintenant.db'
    restart: unless-stopped
    networks:
      - accounting_internal

volumes:
  pg_data:
  redis_data:
  maintenant-data:

networks:
  accounting_internal:
    driver: bridge
