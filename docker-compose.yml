services:
  postgres:
    image: docker.io/postgres:17-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:-accounting-pg}
    restart: unless-stopped
    ports:
      - '${DB_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${DB_USER:-accounting}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-accounting}
      POSTGRES_DB: ${DB_DATABASE:-accounting-dev}
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: docker.io/redis:7-alpine
    container_name: ${REDIS_CONTAINER_NAME:-accounting-redis}
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    command:
      ['redis-server', '--appendonly', 'yes', '--requirepass', '${REDIS_PASSWORD:-redis}']
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:
